description = "Direct executor playbook for using Cursor CLI, Antigravity CLI, and Codex CLI through fresh tmux sessions without going through the usual orchestration runtime. Use when you want a pane-first direct CLI lane, narrow current-worktree follow-up, or fresh-session recovery."
prompt = """
Execute the `direct-cli` skill with args: {{args}}

If you have a Skill tool available: Use it directly with `skill: \"direct-cli\"` instead of reading the file manually.

Otherwise: Read the installed skill file from the Gemini skills root (`.gemini/skills/direct-cli/SKILL.md` for local installs or `~/.gemini/skills/direct-cli/SKILL.md` for global installs) and follow ALL instructions in it.

Prefer the known-good tmux launch commands from the skill playbook first, then wait for pane readiness and send the task prompt with `tmux send-keys`.

If {{args}} names a lane (`cursor`, `agy`, or `codex`) but does not explicitly name a model, ask the user which skill-defined model to use before launching. For Codex, ask for a model/effort pair. Do not show the full CLI model list unless requested or troubleshooting. Use the skill-defined choices: Cursor `composer-2.5-fast`, `composer-2.5`, `claude-fable-5-thinking-high`, `claude-opus-4-8-thinking-high`, or opt-in `claude-sonnet-5-thinking-high`; Antigravity `claude-opus-4-6-thinking`, `claude-sonnet-4-6`, or `gemini-3.6-flash-high` (`gemini-3.6-flash-medium`, then `gemini-3.5-flash-medium` fallback); Codex `gpt-5.6-sol` high, `gpt-5.6-terra` medium, `gpt-5.6-luna` medium, `gpt-5.6-sol` ultra, or specialized-fast `gpt-5.3-codex-spark` high.

Treat skill argument `--effort <level>` as lane-aware. For Agy, pass native `--effort` only when the chosen model supports it and reject any fallback warning or visible model mismatch; specifically, do not add effort to `claude-opus-4-6-thinking`. For Codex, translate effort to CLI config `-c model_reasoning_effort=<level>`; do not pass `--effort` to Codex. For Cursor, use an exact effort-bearing model ID or supported parameterized model expression. If a Codex GPT-5.6 model is explicit but effort is omitted, use Sol high, Terra medium, or Luna medium. Never infer ultra.

If model availability is uncertain, validate with `agent models`, `agy models`, or `codex debug models`; use each CLI's help/doctor commands for flag, feature, or health checks before launching the direct lane.
"""
